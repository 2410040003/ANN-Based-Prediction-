<!DOCTYPE html>
<html>
<head>
    <title>ANN Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #9333ea);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            width: 400px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 1s ease;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .results {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease;
        }

        .card {
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }

        .loader {
            display: none;
            margin-top: 15px;
        }

        .loader div {
            width: 10px;
            height: 10px;
            margin: 3px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 0.6s infinite alternate;
        }

        .loader div:nth-child(2) { animation-delay: 0.2s; }
        .loader div:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            to { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>⚡ ANN Predictor</h1>

    <form method="POST" onsubmit="showLoader()">
        <input type="number" step="any" name="ZL" placeholder="Enter ZL" required>
        <input type="number" step="any" name="Z0" placeholder="Enter Z0" required>
        <button type="submit">Predict</button>
    </form>

    <div class="loader" id="loader">
        <div></div><div></div><div></div>
    </div>

    {% if prediction %}
    <div class="results">
        <div class="card">
            <strong>Predicted Gamma</strong><br>
            {{ prediction }}
        </div>

        <div class="card">
            <strong>Actual Gamma</strong><br>
            {{ actual }}
        </div>
    </div>
    {% endif %}
</div>

<script>
    function showLoader() {
        document.getElementById("loader").style.display = "block";
    }
</script>

</body>
</html>
